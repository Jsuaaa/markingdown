<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Markingdown</title>
    <script>
      (function() {
        var builtInBase = { 'warm-cream': 'light', 'tokyo-night': 'dark', 'solarized-light': 'light', 'nord': 'dark', 'monokai': 'dark' };
        var d = 'light';
        try {
          var stored = JSON.parse(localStorage.getItem('markingdown-themes') || '{}');
          var id = stored.state && stored.state.activeThemeId;
          if (id && builtInBase[id]) {
            d = builtInBase[id];
          } else if (id && stored.state.customThemes) {
            var ct = stored.state.customThemes.find(function(t) { return t.id === id; });
            if (ct) d = ct.baseTheme;
          }
        } catch(e) {
          var old = localStorage.getItem('markingdown-theme');
          d = old === 'dark' ? 'dark' : old === 'light' ? 'light'
            : window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
        }
        document.documentElement.setAttribute('data-theme', d);
        document.documentElement.setAttribute('data-no-transition', '');
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
